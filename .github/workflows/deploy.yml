name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'public/**'
      - 'next.config.*'
      - 'package*.json'
      - 'tsconfig.json'
      - 'tailwind.config.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: |
          mkdir -p .vercel
          printf '{"projectId":"prj_gE46x5IAuhcOshhfhM0m21k62mFW","orgId":"team_6TnBl6VXyzY45Fd3qP1KdIco"}' > .vercel/project.json
      - run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
