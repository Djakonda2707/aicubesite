name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: team_6TnBl6VXyzY45Fd3qP1KdIco
      VERCEL_PROJECT_ID: prj_gE46x5IAuhcOshhfhM0m21k62mFW
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set Vercel project (skip git integration)
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_gE46x5IAuhcOshhfhM0m21k62mFW","orgId":"team_6TnBl6VXyzY45Fd3qP1KdIco"}' > .vercel/project.json

      - name: Deploy (direct upload)
        run: |
          OUTPUT=$(timeout 60 npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 || true)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://aicubesite-[a-z0-9]+-djakonda2707s-projects\.vercel\.app' | tail -1)
          echo "Deploy URL: $DEPLOY_URL"

      - name: Poll until READY and update alias
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          TEAM="team_6TnBl6VXyzY45Fd3qP1KdIco"

          for i in $(seq 1 20); do
            DEPLOYMENTS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=prj_gE46x5IAuhcOshhfhM0m21k62mFW&teamId=$TEAM&limit=3&target=production" 2>/dev/null || echo '{}')

            READY_URL=$(echo "$DEPLOYMENTS" | python3 -c "
import sys,json
d=json.load(sys.stdin)
for dep in d.get('deployments',[]):
  if dep.get('state') == 'READY':
    print('https://' + dep.get('url',''))
    break
" 2>/dev/null)

            echo "[$i/20] Ready URL: ${READY_URL:-none}"

            if [ -n "$READY_URL" ]; then
              echo "✅ Deployment is READY: $READY_URL"
              echo "🔗 Production: https://aicubesite.vercel.app"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ Timed out — check Vercel dashboard"
